version: 2

# ============================================================
# SEMANTIC MODELS + METRICS  (dbt MetricFlow)
# ============================================================
# Single source of truth for metric definitions.
# Internal BI queries these via the dbt Semantic Layer.
# Tinybird pipes implement the same aggregations per company_id.
# Metric names and descriptions are the naming contract both sides share.
#
# AGGREGATION DISCIPLINE:
#   Measures on fact tables use additive primitives (sum, count_distinct, sum).
#   Averages and rates are defined as ratio metrics (numerator / denominator)
#   so the calculation is always correct regardless of which dimensions you
#   group by — never an average of averages.
# ============================================================

semantic_models:

  # ── Support throughput and speed ─────────────────────────────────────────────
  - name: threads_daily
    description: >
      Daily thread measures by channel, priority, and tier.
      Grain: one row per (created_date, channel, priority, company_tier).
      Source for all support throughput and speed metrics.
    model: ref('fact_thread_measures')
    defaults:
      agg_time_dimension: created_date

    entities:
      - name: thread_slice
        type: primary
        expr: "created_date || '|' || channel || '|' || priority || '|' || company_tier"

    dimensions:
      - name: created_date
        type: time
        label: Date
        type_params:
          time_granularity: day
      - name: channel
        type: categorical
        label: Support Channel
        description: email / slack / chat / api / microsoft_teams
      - name: priority
        type: categorical
        label: Thread Priority
        description: urgent / high / normal / low
      - name: company_tier
        type: categorical
        label: Company Tier
        description: enterprise / pro / starter / free

    measures:
      # Additive volume — sum correctly across any dimension combination
      - name: thread_count
        description: Total threads created.
        agg: sum
        expr: total_threads
      - name: resolved_thread_count
        description: Threads resolved (status = done).
        agg: sum
        expr: resolved_threads
      - name: escalated_thread_count
        description: Threads marked as escalated.
        agg: sum
        expr: escalated_threads

      # Additive FRT components — divide in ratio metrics below
      - name: sum_frt_mins
        description: Sum of all first response times in minutes. Divide by frt_response_count for correct avg.
        agg: sum
        expr: sum_frt_mins
      - name: frt_response_count
        description: Threads with a first response time recorded.
        agg: sum
        expr: frt_response_count

      # Additive TTR components
      - name: sum_ttr_mins
        description: Sum of all resolution times in minutes. Divide by ttr_resolved_count for correct avg.
        agg: sum
        expr: sum_ttr_mins
      - name: ttr_resolved_count
        description: Threads resolved with a recorded resolution time.
        agg: sum
        expr: ttr_resolved_count

      # Daily-grain percentile approximations — non-additive, kept for single-day reference
      - name: median_frt_daily
        description: Median FRT for this specific day. Non-additive approximation — do not avg across days.
        agg: average
        expr: median_frt_mins
      - name: p90_frt_daily
        description: p90 FRT for this specific day. Non-additive approximation.
        agg: average
        expr: p90_frt_mins

  # ── SLA compliance ────────────────────────────────────────────────────────────
  - name: sla_performance_monthly
    description: >
      Monthly SLA compliance by company and tier.
      Grain: one row per (breach_month, company_id, company_tier, sla_type).
      Source for SLA risk flags and compliance rates.
    model: ref('fact_sla_performance')
    defaults:
      agg_time_dimension: breach_month

    entities:
      - name: sla_slice
        type: primary
        expr: "company_id || '|' || breach_month || '|' || sla_type"

    dimensions:
      - name: breach_month
        type: time
        label: Month
        type_params:
          time_granularity: month
      - name: company_tier
        type: categorical
        label: Company Tier
      - name: sla_type
        type: categorical
        label: SLA Type
        description: first_response_time / resolution_time
      - name: risk_flag
        type: categorical
        label: SLA Risk Flag
        description: critical / warning / ok

    measures:
      - name: breach_count
        description: Total SLA breach events.
        agg: sum
        expr: breach_count
      - name: threads_breached
        description: Distinct threads that breached SLA.
        agg: sum
        expr: threads_breached
      - name: sum_sla_compliance_pct
        description: Sum of compliance percentages — divide by company_month_count for avg.
        agg: sum
        expr: sla_compliance_pct
      - name: company_month_count
        description: Number of company-month rows — denominator for avg compliance rate.
        agg: count_distinct
        expr: "company_id || '|' || breach_month"

  # ── Customer health ───────────────────────────────────────────────────────────
  - name: customer_health_snapshot
    description: >
      Customer-level health and support signals.
      Grain: one row per customer_id.
      Source for active/churned counts and health status distribution.
    model: ref('dim_customer')
    defaults:
      agg_time_dimension: created_at

    entities:
      - name: customer
        type: primary
        expr: customer_id

    dimensions:
      - name: company_tier
        type: categorical
        label: Company Tier
      - name: health_status
        type: categorical
        label: Health Status
        description: healthy / idle / needs_attention / at_risk / churned / new
      - name: customer_status
        type: categorical
        label: Customer Status
        description: active / idle / churned
      - name: created_at
        type: time
        label: Customer Since
        type_params:
          time_granularity: day

    measures:
      - name: customer_count
        description: Total unique customers.
        agg: count_distinct
        expr: customer_id
      - name: active_customer_count
        description: Customers with status = active.
        agg: sum
        expr: "CASE WHEN is_active THEN 1 ELSE 0 END"
      - name: churned_customer_count
        description: Customers with status = churned.
        agg: sum
        expr: "CASE WHEN is_churned THEN 1 ELSE 0 END"
      - name: at_risk_customer_count
        description: Customers with health_status in (at_risk, needs_attention).
        agg: sum
        expr: "CASE WHEN health_status IN ('at_risk', 'needs_attention') THEN 1 ELSE 0 END"

  # ── MRR time-series ───────────────────────────────────────────────────────────
  # fact_mrr_monthly now has a time dimension (snapshot_month), so MRR metrics
  # can join MetricFlow. Previously excluded because fact_mrr_snapshot was a
  # point-in-time snapshot with no time axis.
  - name: mrr_monthly
    description: >
      Monthly MRR movements by tier — active, new, churned, and net new MRR.
      Grain: one row per (snapshot_month, company_tier).
      Source for revenue trend metrics.
    model: ref('fact_mrr_monthly')
    defaults:
      agg_time_dimension: snapshot_month

    entities:
      - name: mrr_slice
        type: primary
        expr: "snapshot_month || '|' || company_tier"

    dimensions:
      - name: snapshot_month
        type: time
        label: Month
        type_params:
          time_granularity: month
      - name: company_tier
        type: categorical
        label: Company Tier
        description: enterprise / pro / starter

    measures:
      - name: active_mrr_sum
        description: Total MRR from active companies this month.
        agg: sum
        expr: active_mrr
      - name: new_mrr_sum
        description: MRR from companies that became active this month.
        agg: sum
        expr: new_mrr
      - name: churned_mrr_sum
        description: MRR lost from companies that went inactive this month.
        agg: sum
        expr: churned_mrr
      - name: net_new_mrr_sum
        description: new_mrr minus churned_mrr. Positive = growing.
        agg: sum
        expr: net_new_mrr
      - name: active_company_count
        description: Companies active this month.
        agg: sum
        expr: active_companies


# ── Metrics ────────────────────────────────────────────────────────────────────
# Named, reusable metrics consumed by internal BI and used as the
# naming contract for equivalent Tinybird pipe endpoints.
#
# METRIC GLOSSARY: visible in dbt docs under the Metrics section.
# Run: dbt docs generate --static  →  single shareable HTML file.

metrics:

  # ── Support throughput ────────────────────────────────────────────────────────
  # NOTE: MetricFlow ratio metrics reference other metric names, not measure names.
  # Component metrics (threads_resolved, total_frt_mins, etc.) are listed here
  # as simple metrics first, then composed into ratio metrics below.

  - name: thread_volume
    label: Thread Volume
    description: >
      Total support threads created in the period.
      Primary volume signal for support ops. Rising volume without rising headcount
      is an early warning for SLA risk.
    type: simple
    type_params:
      measure: thread_count

  - name: threads_resolved
    label: Threads Resolved
    description: Threads with status = done in the period. Numerator for resolution_rate.
    type: simple
    type_params:
      measure: resolved_thread_count

  - name: resolution_rate
    label: Resolution Rate (%)
    description: >
      Percentage of threads resolved (status = done) in the period.
      Calculated as resolved_threads / total_threads — never an average of daily rates.
      Drops signal under-staffing, rising ticket complexity, or routing problems.
    type: ratio
    type_params:
      numerator: threads_resolved
      denominator: thread_volume

  # ── Speed ─────────────────────────────────────────────────────────────────────
  - name: total_frt_mins
    label: Total First Response Time (mins)
    description: Sum of all first response times in minutes. Divide by first_response_volume for correct average.
    type: simple
    type_params:
      measure: sum_frt_mins

  - name: first_response_volume
    label: First Responses Recorded
    description: Threads with a first response time recorded. Denominator for avg_first_response_time.
    type: simple
    type_params:
      measure: frt_response_count

  - name: avg_first_response_time
    label: Avg First Response Time (mins)
    description: >
      Average time between thread creation and first agent response.
      Calculated as SUM(frt_mins) / COUNT(responses) — correct across any dimension slice.
      Enterprise SLA target: ≤ 60 min. Pro target: ≤ 240 min.
    type: ratio
    type_params:
      numerator: total_frt_mins
      denominator: first_response_volume

  - name: total_ttr_mins
    label: Total Time to Resolution (mins)
    description: Sum of all resolution times in minutes. Divide by resolutions_recorded for correct average.
    type: simple
    type_params:
      measure: sum_ttr_mins

  - name: resolutions_recorded
    label: Resolutions Recorded
    description: Resolved threads with a recorded resolution time. Denominator for avg_resolution_time.
    type: simple
    type_params:
      measure: ttr_resolved_count

  - name: avg_resolution_time
    label: Avg Time to Resolution (mins)
    description: >
      Average time from thread creation to resolution.
      Calculated as SUM(ttr_mins) / COUNT(resolved). Operational efficiency measure.
    type: ratio
    type_params:
      numerator: total_ttr_mins
      denominator: resolutions_recorded

  - name: median_first_response_time
    label: Median First Response Time (mins)
    description: >
      Median FRT — less sensitive to outliers than average.
      Daily-grain approximation. Use for trend direction and single-day comparisons.
      For exact cross-period median, raw thread data is required.
    type: simple
    type_params:
      measure: median_frt_daily

  # ── SLA ───────────────────────────────────────────────────────────────────────
  - name: sla_breach_count
    label: SLA Breach Count
    description: >
      Total SLA breach events in the period.
      Enterprise: any breach triggers warning; >1 triggers critical risk flag.
      Pro: >3 breaches triggers warning.
    type: simple
    type_params:
      measure: breach_count

  - name: sla_compliance_score
    label: SLA Compliance Score (sum)
    description: >
      Running total of per-company-month compliance percentages.
      Divide by sla_measurement_count to get the average compliance rate.
    type: simple
    type_params:
      measure: sum_sla_compliance_pct

  - name: sla_measurement_count
    label: SLA Measurement Count
    description: Company-month observations measured for SLA compliance. Denominator for sla_compliance_rate.
    type: simple
    type_params:
      measure: company_month_count

  - name: sla_compliance_rate
    label: SLA Compliance Rate (%)
    description: >
      Average percentage of threads resolved within SLA targets across measured company-months.
      Below 95% for enterprise is critical. Below 80% for pro is warning.
    type: ratio
    type_params:
      numerator: sla_compliance_score
      denominator: sla_measurement_count

  # ── Customers ─────────────────────────────────────────────────────────────────
  - name: active_customers
    label: Active Customers
    description: Customers with status = active. The retained base.
    type: simple
    type_params:
      measure: active_customer_count

  - name: churned_customers
    label: Churned Customers
    description: Customers with status = churned. Input to churn rate calculation.
    type: simple
    type_params:
      measure: churned_customer_count

  - name: at_risk_customers
    label: At-Risk Customers
    description: >
      Customers with health_status = at_risk or needs_attention.
      CSM intervention target — act before these become churned_customers.
    type: simple
    type_params:
      measure: at_risk_customer_count

  - name: new_customer_acquisitions
    label: New Customer Acquisitions
    description: >
      Customers acquired in the selected period, measured by created_at.
      Query at monthly grain for acquisition trend.
      For GTM: track MoM growth. For leadership: spot acceleration or slowdown early.
    type: simple
    type_params:
      measure: customer_count

  # ── Revenue ───────────────────────────────────────────────────────────────────
  - name: active_mrr
    label: Active MRR (USD)
    description: >
      Monthly recurring revenue from all active companies in the period.
      Directional signal — mrr_usd is a static field, not a Stripe billing event.
      Replace with Stripe subscription data for exact MRR.
    type: simple
    type_params:
      measure: active_mrr_sum

  - name: new_mrr
    label: New MRR (USD)
    description: >
      MRR from companies that became active this month (new or reactivated).
      Gross revenue added — compare to churned_mrr for net growth picture.
    type: simple
    type_params:
      measure: new_mrr_sum

  - name: churned_mrr
    label: Churned MRR (USD)
    description: >
      MRR lost from companies that went inactive this month.
      Direct revenue loss signal. Rising churned_mrr with flat new_mrr = contraction.
    type: simple
    type_params:
      measure: churned_mrr_sum

  - name: net_new_mrr
    label: Net New MRR (USD)
    description: >
      new_mrr minus churned_mrr. The headline growth metric for leadership.
      Positive = growing. Negative = contracting. Zero = flat but could mask churn.
      Does not include expansion or contraction MRR — requires Stripe for full waterfall.
    type: simple
    type_params:
      measure: net_new_mrr_sum
